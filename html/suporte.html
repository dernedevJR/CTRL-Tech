<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>CTRLTECH</title>
</head>
<body class="support">
        <header>
        <a href="index.html">
            <img class="img-mobile" src="../img/logo-1.png"
                alt="Logo do site com formato hexagonal, contendo as letras C e T dentro do mesmo,  na cor azul e branca respectivamente">
        </a>
        <a href="index.html">
            <img class='img-desktop' src="../img/logo_complete_desktop-1.png"
                alt="Logo na versão completa, com nome na empresa feito nas cores azul e branca ao lado da logo com formato hexagonal, contendo as letras C e T dentro do mesmo, na cor azul e branca respectivamente">
        </a>
        <div class="navigation">
            <input type="checkbox" name="" id="menu" hidden>
            <label for="menu" class="hamb-menu">
                <img src="../img/menu.png" alt="">
            </label>
            <nav class="menu">
                <ul class="list-links">
                    <li>
                        <a href="index.html#1">Serviços</a>
                    </li>   
                    <li>
                        <a href="sobre.html">Sobre</a>
                    </li>
                    <li>
                        <a href="#2">Contato</a>
                    </li>
                    <li>
                        <a class="btn link" href="suporte.html">Solicitar suporte</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
    <section class="form">
        <form action="/enviar-dados" method="POST">
            <label for="name">Nome:</label>
            <input type="text" id="name" name="nome" required> <br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required> <br>
            
            <label for="tel">Celular:</label>
            <input type="tel" name="tel" id="tel"> <br>

            <label for="servico">Tipo de Serviço:</label> 
            <input type="text" name="servico" id="servico" list="servicos" required> <br>
            <datalist id="servicos">
                <option value="">Serviços</option>
                <option value="Manutenção">Solicite manutenção do seu aparelho</option>
                <option value="Instalação">Tem algum aparelho que queira instalar?</option>
                <option value="Upgrade">Mais desempenho para o seu PC</option>
                <option value="Formatação">Seu PC como veio ao mundo. Sistema seguro e com backup</option>
                <option value="Outros">Nos diga qual serviço deseja!</option>
            </datalist>

            <label for="descricao">Descrição do Serviço:</label>
            <input type="text" name="descricao" id="descricao">
        </form>
    </section>
</body>
</html>
